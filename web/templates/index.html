<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Drug Interaction Network</title>

<script src="https://unpkg.com/force-graph/dist/force-graph.min.js"></script>
<script src="/static/graph.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
}

.header{
  padding:10px 15px;
  border-bottom:1px solid #ccc;
}

#graph{
  width:100%;
  height:700px;
}

.drugs{
  margin-top:8px;
  font-size:13px;
  color:#444;
}

</style>

</head>

<body>

<div class="header">

<h2>Drug Interaction Network</h2>

<input id="drug" placeholder="Enter drug name">
<button onclick="loadGraph()">Search</button>

<div class="drugs">
Available drugs: 
{% for drug in drugs %}
  <span>{{ drug }}</span>{% if not loop.last %}, {% endif %}
{% endfor %}
</div>

</div>

<div id="graph"></div>

</body>
</html>
