<!DOCTYPE html>
<html>
<head>
<title>PharmaGraph</title>

<script src="https://unpkg.com/3d-force-graph"></script>
<script src="/static/graph.js"></script>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 10px 15px;
}

.controls {
  margin-top: 5px;
}

.drug_list {
  margin-top: 8px;
  font-size: 14px;
  color: #444;
  line-height: 1.4;
}

#3d-graph {
  flex: 1;
  width: 100%;
  border-top: 1px solid #ccc;
}

</style>

</head>

<body>

<div class="header">

<h2>Drug Interaction Network</h2>

<div class="controls">
<input id="drug" placeholder="Enter drug name">
<button onclick="loadGraph()">Search</button>
</div>

<div class="drug_list">
Aspirin, Ibuprofen, Paracetamol, Warfarin, Metformin, Insulin, Lisinopril, Losartan,
Simvastatin, Atorvastatin, Omeprazole, Ranitidine, Amoxicillin, Ciprofloxacin,
Prednisone, Hydrocortisone, Diazepam, Lorazepam, Furosemide, Spironolactone
</div>

</div>

<div id="3d-graph"></div>

</body>
</html>
